---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
# image will be published to ghcr.io/<user>/<name>
name: ml4w-bazzite
description: This is my personal OS image.

# the base image to build on top of (FROM) and the version tag to use
base-image: ghcr.io/ublue-os/bazzite-nvidia
image-version: 41 # latest is also supported if you want new updates ASAP

# module configuration, executed in order
modules:
  - type: files
    files:
      - source: system
        destination: /  # Copies files/system/* into the image's root folder /
      - source: scripts  # Path relative to your project root
        destination: /scripts # Path where it should be placed in the container

  - type: rpm-ostree
    repos:
      - https://copr.fedorainfracloud.org/coprs/atim/starship/repo/fedora-%OS_VERSION%/atim-starship-fedora-%OS_VERSION%.repo
    install:
      - wget
      - unzip
      - rsync
      - git
      - figlet
      - expect
      - hyprland
      - hyprpaper
      - hyprlock
      - hypridle
      - xdg-desktop-portal-hyprland
      - libnotify
      - dunst
      - kitty
      - qt5-qtwayland
      - qt6-qtwayland
      - fastfetch
      - xdg-desktop-portal-gtk
      - eza
      - python-pip
      - python3-gobject
      - tumbler
      - brightnessctl
      - nm-connection-editor
      - network-manager-applet
      - gtk4
      - libadwaita
      - fuse
      - ImageMagick
      - jq
      - xclip
      - firefox
      - neovim
      - htop
      - nautilus
      - pinta
      - blueman
      - grim
      - slurp
      - qt6ct
      - waybar
      - rofi-wayland
      - zsh
      - fzf
      - pavucontrol
      - papirus-icon-theme
      - gvfs
      - wlogout
      - fontawesome-6-free-fonts
      - mozilla-fira-sans-fonts
      - fira-code-fonts
      - flatpak
      - NetworkManager-tui
      - nwg-dock-hyprland
      - yum
          
  - type: script
    scripts:
      - ml4w.sh  # Correct path to the script inside the build container

  - type: default-flatpaks
    notify: true # Send notification after install/uninstall is finished (true/false)
    system:
      install:
        - org.mozilla.firefox
        - org.gnome.Loupe
      remove:
        - org.gnome.eog
    user: {}

  - type: signing # this sets up the proper policy & signing files for signed images to work fully
